# configs/models/coastal_raster.toml

[model]
name    = "coastal_raster"
class   = "coastal_raster"
package = "git+https://github.com/LambdaGeo/coastal-dynamics@uniform"

[model.parameters]
end_time      = 88
taxa_elevacao = 0.5
altura_mare   = 6.0
acrecao_ativa = false
resolution    = 100.0
crs           = "EPSG:31984"