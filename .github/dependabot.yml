version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps):"
      
  - package-ecosystem: "pip"
    directory: "/services/api"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "pip"
    directory: "/services/worker"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
