name: PR Executor Validation

# Este é o mecanismo de segurança do MVP para novos executors.
# Um executor que passa aqui pode ser mergeado com confiança.
# O workflow bloqueia falhas na validação do contrato e tipagem e foca apenas em PRs para novos executors.

on:
  pull_request:
    paths:
      - 'services/worker/executors/**'

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Bandit
        run: pip install bandit
      - name: Run Security Check on modified files
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.py' || true)
          if [ -n "$FILES" ]; then
            bandit -r $FILES -ll -ii
          else
            echo "No python files changed."
          fi

  typecheck:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install mypy
          pip install -r services/worker/requirements.txt
      - name: Run Mypy on modified executor files
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'services/worker/executors/*.py' || true)
          if [ -n "$FILES" ]; then
            mypy --strict $FILES
          else
            echo "No executor files changed."
          fi

  contract:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r services/worker/requirements.txt
      - name: Run Contract Tests
        run: |
          export PYTHONPATH=$PWD/services
          python -c "
          from dissmodel.executor.testing import ExecutorTestHarness
          from dissmodel.executor.registry import ExecutorRegistry
          import worker.executors
          import sys
          
          failed = False
          for name, cls in ExecutorRegistry._executors.items():
              print(f'Testing {name}...')
              harness = ExecutorTestHarness(cls)
              if not harness.run_contract_tests():
                  failed = True
          
          if failed:
              sys.exit(1)
          "

  unittest:
    needs: contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if tests exist
        id: check_tests
        run: |
          if [ -d "services/worker/tests/" ] && [ "$(ls -A services/worker/tests/)" ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi
      - name: Set up Python
        if: steps.check_tests.outputs.has_tests == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        if: steps.check_tests.outputs.has_tests == 'true'
        run: |
          pip install pytest
          pip install -r services/worker/requirements.txt
      - name: Run Unit Tests
        if: steps.check_tests.outputs.has_tests == 'true'
        run: pytest services/worker/tests/

  pr-comment:
    needs: [security, typecheck, contract, unittest]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const statusMap = {
              'success': '✅',
              'failure': '❌',
              'skipped': '⏭️',
              'cancelled': '🚫'
            };
            
            const secStatus = statusMap['${{ needs.security.result }}'] || '❓';
            const typStatus = statusMap['${{ needs.typecheck.result }}'] || '❓';
            const conStatus = statusMap['${{ needs.contract.result }}'] || '❓';
            
            let uniStatus = '⏭️';
            if ('${{ needs.unittest.result }}' && '${{ needs.unittest.result }}' !== 'skipped') {
              uniStatus = statusMap['${{ needs.unittest.result }}'] || '❓';
            }
            
            const body = `### PR Validation Results\n\n| Job | Status |\n|-----------|--------|\n| Security | ${secStatus} |\n| Typecheck | ${typStatus} |\n| Contract | ${conStatus} |\n| Tests | ${uniStatus} |`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
