site_name: DisSModel Platform Documentation
site_description: Documentation for the DisSModel Platform API and Worker system.
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - content.code.copy

plugins:
  - search

nav:
  - Home: index.md
  - Platform:
    - Overview: platform/index.md
    - ExperimentRecord: platform/experiment-record.md
    - Model Registry: platform/registry.md
    - ModelExecutor: platform/executor.md
    - Variable Mapping: platform/variable-mapping.md
    - API Reference: platform/api-reference.md
    - Data Management: platform/data-management.md
    - Executor Test Harness: platform/executor-harness.md
    - Security & Auth: platform/security.md
    - Researcher Guide: platform/researcher-guide.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
